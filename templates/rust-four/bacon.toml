# bacon configuration
# See: https://dystroy.org/bacon/

default_job = "check"

[jobs.check]
command = ["cargo", "check", "--workspace", "--all-targets", "--color", "always"]
need_stdout = false

[jobs.check-all]
command = ["cargo", "check", "--workspace", "--all-targets", "--all-features", "--color", "always"]
need_stdout = false

[jobs.clippy]
command = [
    "cargo", "clippy",
    "--workspace", "--all-targets", "--all-features",
    "--color", "always",
    "--", "-D", "warnings"
]
need_stdout = false

[jobs.test]
command = ["cargo", "test", "--workspace", "--color", "always"]
need_stdout = true

[jobs.nextest]
command = ["cargo", "nextest", "run", "--workspace", "--color", "always"]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--workspace", "--no-deps", "--color", "always"]
need_stdout = false

[jobs.doc-open]
command = ["cargo", "doc", "--workspace", "--no-deps", "--open", "--color", "always"]
need_stdout = false
on_success = "back"

[jobs.run]
command = ["cargo", "run", "--color", "always"]
need_stdout = true
allow_warnings = true

[jobs.expand]
command = ["cargo", "expand", "--color", "always"]
need_stdout = true

[keybindings]
c = "job:check"
a = "job:check-all"
l = "job:clippy"
t = "job:test"
n = "job:nextest"
d = "job:doc"
o = "job:doc-open"
r = "job:run"
e = "job:expand"

